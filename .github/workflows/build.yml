name: Build and Archive
on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      SCHEME: VoiceprintNFT
      APP_ID: "6777992670"

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Install Apple certificate
        env:
          DIST_CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$DIST_CERT_BASE64" | base64 --decode -o $CERT_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Build archive
        run: |
          xcodebuild archive \
            -project VoiceprintNFT.xcodeproj \
            -scheme $SCHEME \
            -configuration Release \
            -archivePath $RUNNER_TEMP/VoiceprintNFT.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=FHBV2X93N8 \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/export.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>FHBV2X93N8</string>
            <key>uploadSymbols</key>
            <true/>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/VoiceprintNFT.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/export.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates

      - name: Upload to ASC
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY_CONTENT" > ~/.private_keys/AuthKey_WDXGY9WX55.p8
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/export/VoiceprintNFT.ipa" \
            -t ios \
            --apiKey WDXGY9WX55 \
            --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec || true

      - name: Submit for review
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          pip3 install pyjwt requests
          python3 - << 'PYEOF'
          import jwt, time, requests, os

          key_id = "WDXGY9WX55"
          issuer = "2be0734f-943a-4d61-9dc9-5d9045c46fec"
          key = os.environ["ASC_API_KEY_CONTENT"]
          app_id = "6777992670"

          def token():
              return jwt.encode({"iss": issuer, "iat": int(time.time()), "exp": int(time.time())+1200, "aud": "appstoreconnect-v1"}, key, algorithm="ES256", headers={"kid": key_id})

          def api(method, path, **kw):
              url = f"https://api.appstoreconnect.apple.com/v1{path}"
              r = requests.request(method, url, headers={"Authorization": f"Bearer {token()}", "Content-Type": "application/json"}, **kw)
              print(f"{method} {path} -> {r.status_code}")
              if r.status_code >= 400: print(r.text[:500])
              return r

          import time as t
          for attempt in range(30):
              r = api("GET", f"/apps/{app_id}/builds?sort=-uploadedDate&limit=1")
              builds = r.json().get("data", [])
              if builds:
                  state = builds[0]["attributes"].get("processingState", "")
                  valid = builds[0]["attributes"].get("valid", False)
                  print(f"  Build state: {state}, valid: {valid}")
                  if state == "VALID" and valid:
                      break
              t.sleep(30)

          r = api("GET", f"/apps/{app_id}/appStoreVersions?filter[platform]=IOS&limit=1")
          versions = r.json().get("data", [])
          if versions:
              vid = versions[0]["id"]
              state = versions[0]["attributes"]["appStoreState"]
              print(f"Version {vid} state: {state}")
              if state in ("PREPARE_FOR_SUBMISSION", "INVALID_BINARY"):
                  r2 = api("GET", f"/apps/{app_id}/builds?sort=-uploadedDate&limit=1")
                  if r2.json().get("data"):
                      build_id = r2.json()["data"][0]["id"]
                      api("PATCH", f"/appStoreVersions/{vid}", json={"data": {"type": "appStoreVersions", "id": vid, "relationships": {"build": {"data": {"type": "builds", "id": build_id}}}}})
                  api("POST", f"/appStoreVersionSubmissions", json={"data": {"type": "appStoreVersionSubmissions", "relationships": {"appStoreVersion": {"data": {"type": "appStoreVersions", "id": vid}}}}})
          PYEOF
