name: Build and Archive
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Set build number
        run: |
          BUILD_NUM=$(( ${{ github.run_number }} + 10 ))
          echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
          sed -i "" "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: \"$BUILD_NUM\"/" project.yml

      - name: Flatten app icon alpha channel
        run: |
          ICON="VoiceprintNFT/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png"
          pip3 install --break-system-packages Pillow
          python3 -c "
          from PIL import Image
          img = Image.open('$ICON').convert('RGBA')
          bg = Image.new('RGBA', img.size, (0, 0, 0, 255))
          bg.paste(img, mask=img)
          bg.convert('RGB').save('$ICON')
          print('Alpha channel removed from app icon')
          "

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Distribution Certificate
        env:
          CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERT_BASE64" | base64 -D > cert.p12
          security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm cert.p12

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$HOME/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PP_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH/profile.mobileprovision"

      - name: Set up ASC API Key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8

      - name: Build Archive
        run: |
          xcodebuild archive \
            -scheme VoiceprintNFT \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/VoiceprintNFT.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=83VGKGSQUH \
            PROVISIONING_PROFILE_SPECIFIER="VoiceprintNFT AppStore" \
            CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/VoiceprintNFT.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist export_options.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
            -authenticationKeyID WDXGY9WX55 \
            -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

      - name: Upload to ASC
        run: |
          xcrun altool --upload-app \
            -f build/export/VoiceprintNFT.ipa \
            -t ios \
            --apiKey WDXGY9WX55 \
            --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec \
            --show-progress

      - name: Install PyJWT
        run: pip3 install --break-system-packages PyJWT requests

      - name: Submit for Review
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          python3 - << 'PYEOF'
          import jwt, time, requests, os, base64

          key_content = os.environ["ASC_API_KEY_CONTENT"]
          key = base64.b64decode(key_content).decode("utf-8")
          app_id = "6777992670"

          def token():
              return jwt.encode({"iss": "2be0734f-943a-4d61-9dc9-5d9045c46fec", "iat": int(time.time()), "exp": int(time.time())+1200, "aud": "appstoreconnect-v1"}, key, algorithm="ES256", headers={"kid": "WDXGY9WX55"})

          def api(method, path, **kw):
              url = f"https://api.appstoreconnect.apple.com/v1{path}"
              r = requests.request(method, url, headers={"Authorization": f"Bearer {token()}", "Content-Type": "application/json"}, **kw)
              print(f"{method} {path} -> {r.status_code}")
              if r.status_code >= 400: print(r.text[:500])
              return r

          # Wait for latest build to be processed
          build_id = None
          build_num = os.environ.get("BUILD_NUM", "0")
          print(f"Looking for build version {build_num}")
          for attempt in range(30):
              r = api("GET", f"/builds?filter[app]={app_id}&filter[version]={build_num}&limit=5")
              builds = r.json().get("data", [])
              if builds:
                  b = builds[0]
                  state = b["attributes"].get("processingState", "")
                  valid = b["attributes"].get("valid", False)
                  ver = b["attributes"].get("version", "?")
                  build_id = b["id"]
                  print(f"  Build {build_id} ver={ver} state={state} valid={valid}")
                  if state == "VALID" and valid:
                      break
                  if state == "VALID" and not valid:
                      print("  Build processed but invalid, cannot submit")
                      break
              else:
                  print(f"  No builds found for version {build_num}")
              print(f"  Attempt {attempt+1}/30, waiting...")
              time.sleep(30)

          if not build_id or not valid:
              print("No valid build found, skipping submission")
          else:
              r = api("GET", f"/apps/{app_id}/appStoreVersions?filter[platform]=IOS&limit=1")
              versions = r.json().get("data", [])
              if versions:
                  vid = versions[0]["id"]
                  vstate = versions[0]["attributes"]["appStoreState"]
                  print(f"Version {vid} state: {vstate}")
                  if vstate in ("PREPARE_FOR_SUBMISSION", "INVALID_BINARY"):
                      api("PATCH", f"/appStoreVersions/{vid}", json={"data": {"type": "appStoreVersions", "id": vid, "relationships": {"build": {"data": {"type": "builds", "id": build_id}}}}})
                      # Try to submit for review
                      sr = api("POST", f"/appStoreVersionSubmissions", json={"data": {"type": "appStoreVersionSubmissions", "relationships": {"appStoreVersion": {"data": {"type": "appStoreVersions", "id": vid}}}}})
                      if sr.status_code == 403:
                          print("Submission blocked - may need manual review in ASC")
          PYEOF
